<html lang="en">

<head>
  <!-- Viewport Settings for Mobile Scaling -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!--Loading Scripts-->
  <script src="/js/partials.js" defer></script>
  <script src="/js/navigation.js" defer></script>

  <!--Importing Roboto font-->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">

  <!--Stylesheet-->
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>

<body>
  <header id="navbar">
  </header>

  <div id="overlay"></div>

  <aside id="sidebar">
  </aside>

  <main id="main-content">
    <div class="mobile-hero-image" id="computer-lab-page-mobile-image"></div>
    <section class="slide-up-top-rounded-card">
    <div id="hero">
      <div class="container">
        <div id="hero-inner">
          <h1 class="hero-title display-lg">
            Need help with <span>software or technical issues?</span>
          </h1>
          <h3 class="hero-subtitle">
            Student assistants are here to help you access and utilize <span>Canvas, Zoom, Microsoft Office, and self
              service
              portal.</span>
          </h3>
        </div>
        <div id="services-circle">
          <img src="../assets/images/public/computer-lab-image.jpg" alt="computer lab image">
        </div>
      </div>
    </div>

    <div class="hours-of-operation">
      <div class="container">
        <div class="hours-of-operation-inner">
          <h1>Operational Hours<br id="computer-lab-line-break"> in LI-141</h1>
          <div class="days-and-hours">
            <h3 class="days">Monday - Thursday</h3>
            <h3 class="hours">8:00 am - 7:00 pm</h3>
          </div>
          <div class="days-and-hours">
            <h3 class="days">Friday</h3>
            <h3 class="hours">8:00 am - 2:00 pm</h3>
          </div>
          <h3 class="closed-info">Closed on Saturdays, Sundays, and Holidays</h3>
        </div>
      </div>
    </div>
    </section>
  </main>

  <footer id="site-footer">
  </footer>

</body>

</html>
