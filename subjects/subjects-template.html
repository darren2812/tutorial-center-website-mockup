<html lang="en">

<head>
  <!-- Viewport Settings for Mobile Scaling -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!--Loading Scripts-->
  <script src="/js/partials.js" defer></script>
  <script src="/js/navigation.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.js"
    integrity="sha512-M0cjXJTonbWEdLI3HJIoJSQBb9980RWmOCk+tvWkhgFrAZqSSIg1+1Db/vDu7Qk9W3L90gBynve17PYvarjfQA=="
    crossorigin="anonymous" referrerpolicy="no-referrer" defer></script>
  <script src="/js/subjects.js" defer></script>

  <!--Importing Roboto font-->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">

  <!--Stylesheet-->
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>

<body>
  <header id="navbar">
  </header>

  <div id="overlay"></div>

  <aside id="sidebar">
  </aside>

  <main id="main-content">
    <div class="container">
      <div id="subject-info-container">
        <div id="subject-info">
          <h1 id="subject-title" class="display-lg"></h1>
          <h3 id="subject-description"></h3>
        </div>
        <div class="rounded-box" id="subjects-box">
          <div class="rounded-box-content">
            <h2>Filter Schedule</h2>
            <div class="schedule-filter">
              <div class="filter-section">
                <label for="course-filter">By Course</label>
                <select id="course-filter" name="course">
                  <option value="">None</option>
                </select>
              </div>
              <div class="filter-section">
                <label for="type-filter">By Type</label>
                <select id="type-filter" name="type">
                  <option value="">None</option>
                  <option value="drop-in">Drop In Tutoring</option>
                  <option value="etc">Extending the Class</option>
                </select>
              </div>
              <div class="filter-section">
                <label for="instructor-filter">By Instructor</label>
                <select id="instructor-filter" name="instructor">
                  <option value="">None</option>
                </select>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div id="subject-disclaimer">
      <div class="container">
        <h3>
          Schedules may change due to tutor absences or unforeseen circumstances.
          Please double-check room assignments and in-person/online availability.
        </h3>
      </div>
    </div>
    <div class="container" id="subject-sections">
      <div id="drop-in-info">
        <h1>Drop in tutoring at <span id="drop-in-location"></span></h1>
        <div class="schedule-container">
          <section class="schedule">
            <iframe id="drop-in-iframe" loading="lazy">
            </iframe>
          </section>
        </div>
      </div>
      <div id="etc-info">
        <h1>ETC Tutoring</h1>
        <div class="schedule-container">
          <section class="schedule">
            <table>
              <thead>
                <tr id="table-headings">
                  <th scope="col">Course</th>
                  <th scope="col">Instructor</th>
                  <th scope="col">Sunday</th>
                  <th scope="col">Monday</th>
                  <th scope="col">Tuesday</th>
                  <th scope="col">Wednesday</th>
                  <th scope="col">Thursday</th>
                  <th scope="col">Friday</th>
                  <th scope="col">Saturday</th>
                </tr>
              </thead>
              <tbody id="table-contents">
              </tbody>
            </table>
          </section>
        </div>
      </div>
      <div id="online-info">
        <h1>Online Tutoring</h1>
        <div class="schedule-container">
          <section class="schedule">
            <iframe id="online-iframe" loading="lazy">
            </iframe>
          </section>
        </div>
      </div>
    </div>
  </main>

  <footer id="site-footer">
  </footer>

</body>

</html>
